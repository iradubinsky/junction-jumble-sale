<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Giant Junction Jumble Sale 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fde9c0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .banner {
      width: 100%;
      max-width: 1200px;
      max-height: 500px;
      display: block;
    }

    .banner img {
      width: 100%;
      display: block;
    }

    .links {
      width: 100%;
      max-width: 600px;
      padding: 2.5rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: .8rem 1.25rem;
      border-radius: 16px;
      text-decoration: none;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    .btn-register {
      background: #e8352a;
      color: #fff;
    }

    .btn-map {
      background: #fff;
      color: #e8352a;
      border: 3px solid #e8352a;
    }

    .btn-facebook {
      background: #1877f2;
      color: #fff;
    }

    .btn-icon {
      font-size: 1.4rem;
      line-height: 1;
    }

    .footer {
      font-size: 13px;
      color: #b07d3a;
      padding-bottom: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="banner">
    <img src="websitebanner.png" alt="Giant Junction Jumble Sale 2026">
  </div>

  <div style="text-align: center; padding: 1.5rem 1rem 0.5rem; font-family: 'Fredoka One', cursive; color: #c0392b; line-height: 1.8;">
  <div style="font-size: 1.6rem;">SAT, MAY 23rd, 2026   |   8:30AM – 2:30PM</div>
    <div style="font-size: 1rem;">QUEBEC - CLENDENAN - LAWS - EVELYN - FAIRVIEW - GILMOUR - ST. JOHN'S & MORE</div>
  <div style="font-size: 0.85rem; font-family: 'Nunito', sans-serif; color: #b07d3a; margin-top: 4px;">Rain date: Sat, May 30th</div>
</div>

  <div class="links">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfy32DHoNvH5gw_KyZWB1-pPII3WneDdtG2NOBoVz_YQBVSqw/viewform" target="_blank" class="btn btn-register">
      <span class="btn-icon">📋</span> Register Your House
    </a>
    <a href="https://iradubinsky.github.io/junction-jumble-sale/map.html" target="_blank" class="btn btn-map">
      <span class="btn-icon">📍</span> View the Sale Map
    </a>
    <a href="https://www.facebook.com/events/2035069350763204/" target="_blank" class="btn btn-facebook">
      <span class="btn-icon">👍</span> Facebook Event
    </a>
  </div>

  <p class="footer">The Junction, Toronto · 2026</p>

</body>
</html>
